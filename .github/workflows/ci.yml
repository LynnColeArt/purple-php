name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  root-sdk:
    name: Root SDK (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.2'
          - '8.3'
          - '8.4'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Validate root Composer metadata
        run: composer validate --strict

      - name: Install root dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Check root SDK
        run: composer check

  provider-bedrock:
    name: Bedrock Provider (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    # Default validation intentionally configures no AWS credentials, live
    # Bedrock network calls, sidecar process, or native extension.
    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.2'
          - '8.3'
          - '8.4'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Validate Bedrock provider Composer metadata
        run: composer validate --working-dir=packages/provider-bedrock --strict

      - name: Install Bedrock provider dependencies
        run: composer install --working-dir=packages/provider-bedrock --no-interaction --no-progress --prefer-dist

      - name: Check Bedrock provider package
        run: composer check --working-dir=packages/provider-bedrock
